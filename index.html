<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Pomelli</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Google+Symbols:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: '#1b1b1b',
              'surface-highest': '#333537',
              'surface-high': '#282a2c',
              'surface-container': '#1e1f20',
              primary: '#c1cd7d',
              'on-primary': '#2c3400',
              'on-surface': '#e5e3d9',
              'on-surface-variant': '#c7c8b6',
              outline: '#919282',
              tertiary: '#a2d0c3',
              secondary: '#c5caa3',
            },
            fontFamily: {
              playfair: ['"Playfair Display"', 'serif'],
              sans: ['"Google Sans Text"', 'sans-serif'],
            },
            keyframes: {
              'slide-up-fade': {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'scroll-up-down': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-200px)' },
              }
            },
            animation: {
              'slide-up-fade': 'slide-up-fade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.1s',
              'scroll-up-down': 'scroll-up-down 12s ease-in-out infinite',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #1b1b1b;
        color: #e5e3d9;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .google-symbols {
        font-family: 'Google Symbols';
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
